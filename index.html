<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- No Content-Security-Policy meta here; exercise GIFs load from Supabase Edge Functions (same origin as VITE_SUPABASE_URL). -->
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoachBase" />
    <title>CoachBase - منصة المدرب الشخصي</title>
    <meta name="description" content="منصة CoachBase للمدربين الشخصيين — أدر عملاءك باحترافية">
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    
    
    
    
    <meta property="og:image" content="https://coachbase.health/og-image.png">
    <meta name="twitter:image" content="https://coachbase.health/og-image.png">
    <meta property="og:url" content="https://coachbase.health" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:type" content="website" />
    <script>
      (function () {
        try {
          var d = document.documentElement;
          var saved = localStorage.getItem("theme");
          if (saved === "light") {
            d.classList.remove("dark");
          } else {
            d.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        background-color: #f5f5f0;
      }
      html.dark,
      html.dark body,
      html.dark #root {
        background-color: #0e0e0f;
      }
    </style>
    <meta property="og:title" content="CoachBase - منصة المدرب الشخصي">
  <meta name="twitter:title" content="CoachBase - منصة المدرب الشخصي">
  <meta property="og:description" content="منصة CoachBase للمدربين الشخصيين — أدر عملاءك باحترافية">
  <meta name="twitter:description" content="منصة CoachBase للمدربين الشخصيين — أدر عملاءك باحترافية">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
