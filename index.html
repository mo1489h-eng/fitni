<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- No Content-Security-Policy meta here; exercise GIFs load from Supabase Edge Functions (same origin as VITE_SUPABASE_URL). -->
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoachBase" />
    <title>CoachBase - منصة المدرب الشخصي</title>
    <meta name="description" content="منصة CoachBase للمدربين الشخصيين — أدر عملاءك باحترافية" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <meta property="og:title" content="CoachBase - منصة المدرب الشخصي" />
    <meta name="twitter:title" content="CoachBase - منصة المدرب الشخصي" />
    <meta property="og:description" content="منصة CoachBase للمدربين الشخصيين — أدر عملاءك، تابع تقدمهم، ونظّم مدفوعاتك باحترافية." />
    <meta name="twitter:description" content="منصة CoachBase للمدربين الشخصيين — أدر عملاءك، تابع تقدمهم، ونظّم مدفوعاتك باحترافية." />
    <meta property="og:image" content="https://coachbase.health/og-image.png" />
    <meta name="twitter:image" content="https://coachbase.health/og-image.png" />
    <meta property="og:url" content="https://coachbase.health" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:type" content="website" />
    <script>
      (function () {
        try {
          var d = document.documentElement;
          var t = localStorage.getItem("theme");
          var dark = false;
          if (t === "dark") dark = true;
          else if (t === "light") dark = false;
          else dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) d.classList.add("dark");
          else d.classList.remove("dark");
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        background-color: hsl(210 40% 98%);
      }
      html.dark,
      html.dark body,
      html.dark #root {
        background-color: hsl(222 84% 4.9%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
